# Batch experiment config — runs DAG-Seg and DAG-Det across multiple models.
# Used by scripts/run_experiment.py.
#
# Output layout: {output_dir}/{task}/{model_name}/{image_id}/

# === models per task (lists) ===
# Seg options: fcn_resnet50, fcn_resnet101, deeplabv3_resnet50, deeplabv3_resnet101
seg_models:
  - fcn_resnet50
  #- deeplabv3_resnet101

# Det options: fasterrcnn_resnet50_fpn, fasterrcnn_resnet50_fpn_v2
det_models:
  - fasterrcnn_resnet50_fpn
  #- fasterrcnn_resnet50_fpn_v2

# === iterations ===
seg_iter: 200                     # paper budget
det_iter: 150                     # paper budget

# === sample selection ===
num_item: null                    # null = full dataset (every image in the seg trainval split)

# === dataset ===
voc_root: /tmp/VOCdevkit/VOC2007
year: "2007"
split: trainval                   # ImageSets/Segmentation/<split>.txt — images with both .png and .xml

# === input scaling ===
seg_short_side: 520
det_short_side: 600

# === per-task knobs ===
seg_shape: square                 # circle | square | strip
seg_step_length: 0.5
seg_success_ratio: 0.01

det_step_length: 0.5
det_num_classes: 21               # VOC-native head (warm-started from COCO)
det_rpn_post_nms_top_n: 3000
det_rpn_nms_thresh: 0.9
det_strong_nms_thresh: 0.35
det_strong_score_thresh: 0.8

# === infra ===
device: cuda
output_dir: /home/adsl-1-2/GitHub/DAG/outputs/experiment
seed: 0
skip_existing: true               # don't redo an (image, model) if metrics.json already exists
